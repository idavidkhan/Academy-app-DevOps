name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/frontend_academy_app
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/backend_academy-app
  IMAGE_TAG: ${{ github.sha }}

jobs:
  sonar_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  OWASP_Dependency_Check:
    runs-on: ubuntu-latest
    needs: sonar_scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache OWASP NVD Data
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check/data
          key: owasp-${{ runner.os }}
          restore-keys: owasp-${{ runner.os }}-

      - name: OWASP Dependency Check — Frontend
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "academy-frontend"
          path: "./Frontend"
          format: "HTML"
          args: --failOnCVSS 11 --enableRetired

      - name: Upload OWASP Frontend Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-frontend-report
          path: reports/

      - name: OWASP Dependency Check — Backend
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "academy-backend"
          path: "./backend"
          format: "HTML"
          args: --failOnCVSS 11 --enableRetired

      - name: Upload OWASP Backend Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-backend-report
          path: reports/

  IMAGE_BUILD_PUSH:
    runs-on: ubuntu-latest
    needs: OWASP_Dependency_Check
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Frontend Image
        run: |
          docker build \
            -t ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            ./Frontend

      - name: Build Backend Image
        run: |
          docker build \
            -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            ./backend

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Push Frontend to DockerHub
        run: |
          docker push ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      - name: Push Backend to DockerHub
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

  trivy_scan:
    runs-on: ubuntu-latest
    needs: PUSH_IMAGES
    steps:
      - name: Trivy Scan — Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

      - name: Trivy Scan — Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

  update_cd_repo:
    runs-on: ubuntu-latest
    needs: trivy_scan
    steps:
      - name: Checkout CD repo
        uses: actions/checkout@v4
        with:
          repository: idavidkhan/Academy-app-DevOps-CD/
          ref: main
          token: ${{ secrets.CD_REPO_TOKEN }}
          path: cd

      - name: Bump images in manifests (safe)
        working-directory: cd
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          curl -sL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o yq && sudo install yq /usr/local/bin/yq

          # -- Safety cleanup: remove any accidental .spec.template from Service docs
          yq -i '(. | select(.kind=="Service")) |= del(.spec.template)' Kubernetes/backend.yaml
          yq -i '(. | select(.kind=="Service")) |= del(.spec.template)' Kubernetes/frontend.yaml

          # -- Update ONLY Deployment images (backend)
          yq -i '
            (. | select(.kind=="Deployment")
               | .spec.template.spec.containers[]
               | select(.name=="backend")
               | .image)
            = "${{ env.BACKEND_IMAGE }}:" + strenv(IMAGE_TAG)
          ' Kubernetes/backend.yaml

          # -- Update ONLY Deployment images (frontend)
          yq -i '
            (. | select(.kind=="Deployment")
               | .spec.template.spec.containers[]
               | select(.name=="frontend")
               | .image)
            = "${{ env.FRONTEND_IMAGE }}:" + strenv(IMAGE_TAG)
          ' Kubernetes/frontend.yaml

      - name: Commit & push to CD repo
        working-directory: cd
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add -A
          git commit -m "bump images to ${IMAGE_TAG}" || echo "no changes"
          git push
